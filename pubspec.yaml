name: meditation_app
description: A beautiful and modern meditation app for TY project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  flutter_local_notifications: ^17.2.4

  audioplayers: ^5.2.1
  permission_handler: ^11.3.0
  lottie: ^2.7.0
  http: ^1.4.0
  flutter_dotenv: ^5.0.2
  table_calendar: ^3.0.9
  percent_indicator: ^4.2.2
  fl_chart: ^0.64.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/meditation.png
    - assets/images/app_logo.png
    - assets/chime.wav
    - assets/animations/meditation.json
    - assets/animations/meditation1.json
    - assets/animations/moon_sleep.json
    - assets/animations/breathing_circle.json
    - .env

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
