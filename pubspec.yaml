name: meditation_app
description: A beautiful and modern meditation app for TY project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.3
  intl: ^0.19.0
  audioplayers: ^5.2.1
  permission_handler: ^11.3.0
  lottie: ^2.7.0
  http: ^1.4.0
  flutter_dotenv: ^5.0.2
  table_calendar: ^3.0.9
  percent_indicator: ^4.2.2
  fl_chart: ^0.64.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  timezone: ^0.9.2
  just_audio: ^0.9.36
  audio_session: ^0.1.14
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  flutter_neumorphic: ^3.2.0
  url_launcher: ^6.2.5
  provider: ^6.1.4
  sqflite: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/meditation.png
    - assets/images/app_logo.png
    - assets/chime.wav
    - assets/animations/meditation.json
    - assets/animations/meditation1.json
    - assets/animations/moon_sleep.json
    - assets/animations/breathing_circle.json
    - assets/animations/relax_bg.json
    - assets/audio/meditation.mp3
    - assets/audio/relaxation.mp3
    - assets/images/Meditation.jpg
    - assets/images/Relexation.jpg
    - assets/images/avatar.png
    - assets/images/BodyCleanse.jpg
    - assets/images/InnerConnectivity.jpg
    - assets/audio/body_cleanse.mp3
    - assets/audio/inner_connectivity.mp3

    

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
